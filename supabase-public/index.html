<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Catalogo menudeo | Perfumes</title>
    <meta name="description" content="Catalogo de perfumes de menudeo con pedido por WhatsApp">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/style.css">
</head>
<body data-catalogo="menudeo">
<header class="hero hero-menudeo">
    <div class="container hero-inner">
        <div class="hero-copy">
            <span class="hero-kicker">Catalogo menudeo</span>
            <h1>Perfumes arabes y de diseñador para todos los dias</h1>
            <p>Explora fragancias intensas, frescas y dulces con compra directa por WhatsApp.</p>
            <div class="hero-tags" aria-label="Categorias destacadas">
                <span>Lattafa</span>
                <span>Armaf</span>
                <span>Afnan</span>
                <span>Unisex</span>
            </div>
        </div>
    </div>
</header>

<nav class="navbar sticky-top catalog-nav">
    <div class="container py-2 gap-2">
        <a class="navbar-brand brand-lockup" href="index.html">
            <span>Mi Perfumeria</span>
            <small>Catalogo digital</small>
        </a>
        <div class="catalog-actions d-flex flex-grow-1 justify-content-end gap-2">
            <input id="buscador" class="form-control buscador" type="search" placeholder="Buscar perfume o marca">
            <a class="btn btn-outline-accent d-none d-md-inline-flex" href="mayoreo.html">Mayoreo</a>
            <a class="btn btn-soft" href="admin.html">Admin</a>
            <button class="btn btn-primary-dark position-relative" type="button" data-bs-toggle="offcanvas" data-bs-target="#carritoCanvas">
                Carrito
                <span id="contadorCarrito" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">0</span>
            </button>
        </div>
    </div>
</nav>

<main class="container catalog-main">
    <div id="estadoCatalogo" class="alert alert-info">Cargando catalogo...</div>
    <div id="listaPerfumes" class="row g-4"></div>
</main>

<div class="offcanvas offcanvas-end" tabindex="-1" id="carritoCanvas">
    <div class="offcanvas-header border-bottom">
        <h3 class="offcanvas-title h5 mb-0">Pedido de menudeo</h3>
        <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body d-flex flex-column">
        <div id="carritoVacio" class="text-center text-secondary py-5">Tu carrito esta vacio.</div>
        <div id="itemsCarrito" class="vstack gap-3"></div>
        <div class="mt-auto pt-3 border-top">
            <div class="d-flex justify-content-between fs-5 fw-bold mb-3">
                <span>Total</span>
                <span id="totalCarrito">$0.00</span>
            </div>
            <button id="btnWhatsApp" class="btn btn-success w-100 btn-lg" type="button" disabled>
                Enviar pedido por WhatsApp
            </button>
            <button id="btnVaciar" class="btn btn-link text-danger w-100 mt-2" type="button" disabled>
                Vaciar carrito
            </button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script src="assets/supabase-catalog.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
